name: PISTA 毎日自動実行

on:
  schedule:
    - cron: '30 21 * * *'   # 毎日 06:30 JST (朝フェッチ: 前日〜7日前の結果取得・照合)
    - cron: '0 1 * * *'     # 毎日 10:00 JST (picks)
    - cron: '0 14 * * *'    # 毎日 23:00 JST (夕方フェッチ: レース終了後に結果取得・照合)
    - cron: '0 15 * * 0'    # 毎週日曜 00:00 JST (週次最適化)
  workflow_dispatch:         # 手動実行ボタン

jobs:
  fetch:
    name: データ取得 (--fetch, 朝スキャン)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 21 * * *'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py --fetch --days 7   # 直近7日分の結果を取得・照合

  grade:
    name: 結果取得＆照合 (--grade, 夕方)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 14 * * *'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py --grade   # 結果待ちシグナルの会場だけ取得して照合

  picks:
    name: 推奨車券生成 (--picks)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 1 * * *'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py --picks

  optimize:
    name: バックテスト最適化 (--optimize, 週次 + 手動)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 15 * * 0'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py --optimize --trials 200
